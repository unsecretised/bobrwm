name: Release

on:
  push:
    branches: [main]
  release:
    types: [published]

concurrency:
  group: release-${{ github.event_name == 'push' && 'tip' || github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Install Zig
        run: brew install zig

      - name: Build
        run: zig build -Doptimize=ReleaseFast --prefix /tmp/bobrwm

      - name: Move tip tag
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -fa tip -m "Latest Continuous Release" "$GITHUB_SHA"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin tip

      - name: Upload binary to tip release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || github.token }}
        run: |
          tar -czf /tmp/bobrwm-tip-aarch64-macos.tar.gz -C /tmp/bobrwm .
          gh release view tip >/dev/null 2>&1 || \
            gh release create tip \
              --title 'bobrwm tip' \
              --notes 'Latest continuous build from main.' \
              --prerelease \
              --target "$GITHUB_SHA"
          gh release edit tip \
            --title 'bobrwm tip' \
            --notes 'Latest continuous build from main.' \
            --prerelease \
            --target "$GITHUB_SHA"
          gh release upload tip /tmp/bobrwm-tip-aarch64-macos.tar.gz --clobber

      - name: Upload binary to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          tar -czf "/tmp/bobrwm-${TAG}-aarch64-macos.tar.gz" -C /tmp/bobrwm .
          gh release upload "$TAG" "/tmp/bobrwm-${TAG}-aarch64-macos.tar.gz"

      - name: Dispatch to homebrew-tap
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          gh api repos/bobrwm/homebrew-tap/dispatches \
            -f event_type=bottle \
            -f "client_payload[tag]=$TAG"
